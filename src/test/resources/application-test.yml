spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  threads:
    virtual:
      enabled: false

# Desactivar observabilidad en tests
management:
  endpoints:
    web:
      exposure:
        include: health
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  tracing:
    enabled: false

logging:
  level:
    root: WARN
    com.dliriotech.tms.tyreservice: DEBUG
    org.hibernate.SQL: DEBUG


